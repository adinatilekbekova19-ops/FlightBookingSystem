spring:
  datasource:
    url: jdbc:h2:mem:flightdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 123123
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  freemarker:
    suffix: .ftlh
    cache: false
    request-context-attribute: rc

  logging:
    level:
      kg.demo.flightbookingsystem: DEBUG
      org.springframework.security: INFO
    pattern:
      console: "%d{HH:mm:ss} %-5level [%logger{36}] - %msg%n"

server:
  port: 8080